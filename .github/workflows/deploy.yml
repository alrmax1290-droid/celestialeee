name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: 92.38.177.47
          username: a
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            export PATH="$HOME/.bun/bin:$PATH:$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node 2>/dev/null | tail -1)/bin"
            cd ~/celestial
            git pull
            bun install
            pm2 restart celestial --update-env
            pm2 save
